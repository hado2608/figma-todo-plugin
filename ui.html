<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>getitdone</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 13px;
    color: #1a1a1a;
    background: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Default view ── */
  #default-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 24px;
  }

  .shortcut-hint {
    color: #aaa;
    font-size: 11px;
  }

  kbd {
    background: #f0f0f0;
    border: 1px solid #ccc;
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: inherit;
  }

  .btn-primary {
    background: #7C3AED;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary:hover { background: #6d28d9; }

  /* ── Edit view ── */
  #edit-view {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  /* Purple header */
  .edit-header {
    background: #7C3AED;
    padding: 16px 16px 12px;
    flex-shrink: 0;
  }

  .header-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #header-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
  }
  #header-input::placeholder { color: rgba(255,255,255,0.45); }

  /* Calendar toggle button */
  .cal-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    line-height: 1;
    border-radius: 4px;
    color: rgba(255,255,255,0.8);
    flex-shrink: 0;
  }
  .cal-btn:hover { background: rgba(255,255,255,0.15); }

  /* Date picker row — shown/hidden by JS */
  .date-picker-row {
    display: none;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .date-picker-row.open { display: flex; }

  #date-input {
    flex: 1;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    padding: 4px 8px;
    color: #fff;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    /* Make the calendar picker icon white */
    color-scheme: dark;
  }

  .clear-date-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0 2px;
    flex-shrink: 0;
  }
  .clear-date-btn:hover { color: #fff; }

  /* Deadline display row */
  .deadline-display {
    display: none;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
  }
  .deadline-display.visible { display: flex; }

  .deadline-text {
    color: #D8B4FE;
    font-size: 13px;
    font-style: italic;
    flex: 1;
  }

  /* ── Todo body ── */
  .todo-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px 0;
    display: flex;
    flex-direction: column;
  }

  /* Each existing todo row */
  .todo-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 5px 0;
    cursor: pointer;
  }
  .todo-row:hover .del-btn { opacity: 1; }

  /* The 10×10 checkbox box */
  .todo-box {
    width: 10px;
    height: 10px;
    border: 1.5px solid #1a1a1a;
    flex-shrink: 0;
    margin-top: 3px;
    cursor: pointer;
  }
  .todo-box.checked {
    background: #1a1a1a;
  }

  .todo-label {
    flex: 1;
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
    cursor: pointer;
  }
  .todo-label.done {
    text-decoration: line-through;
    color: #999;
  }

  .del-btn {
    opacity: 0;
    background: transparent;
    border: none;
    color: #bbb;
    font-size: 15px;
    cursor: pointer;
    padding: 0 2px;
    flex-shrink: 0;
    line-height: 1;
  }
  .del-btn:hover { color: #e53e3e; opacity: 1; }

  /* Notion-like add row */
  .add-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 0 16px;
  }

  .add-box-placeholder {
    width: 10px;
    height: 10px;
    border: 1.5px dashed #bbb;
    flex-shrink: 0;
    margin-top: 3px;
  }

  #new-todo-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 13px;
    font-family: inherit;
    color: #1a1a1a;
    background: transparent;
  }
  #new-todo-input::placeholder { color: #bbb; }
</style>
</head>
<body>

<!-- Default view -->
<div id="default-view">
  <button class="btn-primary" id="add-btn">+ Add Sticker</button>
  <p class="shortcut-hint">or press <kbd>⌥⇧S</kbd></p>
</div>

<!-- Edit view -->
<div id="edit-view">

  <!-- Purple header -->
  <div class="edit-header">
    <div class="header-row">
      <input id="header-input" type="text" placeholder="Header" maxlength="60" />
      <button class="cal-btn" id="cal-btn" title="Set deadline">📅</button>
    </div>

    <!-- Date picker: visible native input, toggled open/closed -->
    <div class="date-picker-row" id="date-picker-row">
      <input id="date-input" type="date" />
      <button class="clear-date-btn" id="clear-date" title="Remove date">×</button>
    </div>

    <!-- Deadline display (when date is set and picker is closed) -->
    <div class="deadline-display" id="deadline-display">
      <span class="deadline-text" id="deadline-text"></span>
    </div>
  </div>

  <!-- Todo list + add row -->
  <div class="todo-body" id="todo-body">
    <div id="todo-list"></div>

    <!-- Notion-like integrated add row -->
    <div class="add-row">
      <div class="add-box-placeholder"></div>
      <input id="new-todo-input" type="text" placeholder="Add a to-do…" maxlength="200" />
    </div>
  </div>

</div>

<script>
  let currentNodeId = null;
  let sticker = { header: '', deadline: null, todos: [] };

  // ── Views ──
  function showDefault() {
    document.getElementById('default-view').style.display = 'flex';
    document.getElementById('edit-view').style.display = 'none';
    currentNodeId = null;
  }

  function showEdit(data, nodeId) {
    sticker = JSON.parse(JSON.stringify(data));
    currentNodeId = nodeId;
    document.getElementById('default-view').style.display = 'none';
    document.getElementById('edit-view').style.display = 'flex';
    renderAll();
    // Focus the input so user can start typing immediately
    setTimeout(() => document.getElementById('new-todo-input').focus(), 50);
  }

  function renderAll() {
    document.getElementById('header-input').value = sticker.header;
    renderDeadline();
    renderTodos();
  }

  // ── Deadline ──
  function renderDeadline() {
    const display = document.getElementById('deadline-display');
    const text = document.getElementById('deadline-text');
    const input = document.getElementById('date-input');

    if (sticker.deadline) {
      input.value = sticker.deadline;
      const date = new Date(sticker.deadline + 'T00:00:00');
      text.textContent = 'by ' + date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      display.classList.add('visible');
    } else {
      input.value = '';
      display.classList.remove('visible');
    }
  }

  function toggleDatePicker() {
    const row = document.getElementById('date-picker-row');
    const isOpen = row.classList.contains('open');
    if (isOpen) {
      row.classList.remove('open');
    } else {
      row.classList.add('open');
      // Hide the display label while picker is open
      document.getElementById('deadline-display').classList.remove('visible');
      document.getElementById('date-input').focus();
    }
  }

  // ── Todos ──
  function renderTodos() {
    const list = document.getElementById('todo-list');
    list.innerHTML = '';
    sticker.todos.forEach(todo => {
      const row = document.createElement('div');
      row.className = 'todo-row';

      const box = document.createElement('div');
      box.className = 'todo-box' + (todo.done ? ' checked' : '');

      const label = document.createElement('span');
      label.className = 'todo-label' + (todo.done ? ' done' : '');
      label.textContent = todo.text;

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '×';
      del.title = 'Delete';

      // Click box OR label → toggle done
      box.addEventListener('click', (e) => { e.stopPropagation(); toggleTodo(todo.id); });
      label.addEventListener('click', () => toggleTodo(todo.id));
      del.addEventListener('click', (e) => { e.stopPropagation(); deleteTodo(todo.id); });

      row.appendChild(box);
      row.appendChild(label);
      row.appendChild(del);
      list.appendChild(row);
    });
  }

  // ── Actions ──
  function addSticker() {
    parent.postMessage({ pluginMessage: { type: 'create-sticker' } }, '*');
  }

  function sync() {
    if (!currentNodeId) return;
    parent.postMessage({ pluginMessage: { type: 'update-sticker', nodeId: currentNodeId, data: sticker } }, '*');
  }

  function toggleTodo(id) {
    const todo = sticker.todos.find(t => t.id === id);
    if (todo) { todo.done = !todo.done; renderTodos(); sync(); }
  }

  function deleteTodo(id) {
    sticker.todos = sticker.todos.filter(t => t.id !== id);
    renderTodos();
    sync();
  }

  function addTodo(text) {
    const trimmed = text.trim();
    if (!trimmed) return;
    sticker.todos.push({ id: Date.now().toString(), text: trimmed, done: false });
    renderTodos();
    sync();
  }

  // ── Event listeners ──
  document.getElementById('add-btn').addEventListener('click', addSticker);

  document.getElementById('header-input').addEventListener('input', (e) => {
    sticker.header = e.target.value;
    sync();
  });

  document.getElementById('cal-btn').addEventListener('click', toggleDatePicker);

  document.getElementById('date-input').addEventListener('change', (e) => {
    sticker.deadline = e.target.value || null;
    // Close picker and show display
    document.getElementById('date-picker-row').classList.remove('open');
    renderDeadline();
    sync();
  });

  document.getElementById('clear-date').addEventListener('click', (e) => {
    e.stopPropagation();
    sticker.deadline = null;
    document.getElementById('date-input').value = '';
    document.getElementById('date-picker-row').classList.remove('open');
    renderDeadline();
    sync();
  });

  document.getElementById('new-todo-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addTodo(e.target.value);
      e.target.value = '';
      // Keep focus so user can type the next item immediately
      e.target.focus();
    }
  });

  // Option+Shift+S → add sticker (only when default view active, not typing)
  document.addEventListener('keydown', (e) => {
    const tag = document.activeElement.tagName;
    const isTyping = tag === 'INPUT' || tag === 'TEXTAREA';
    if (!isTyping && e.altKey && e.shiftKey && e.code === 'KeyS') {
      addSticker();
    }
  });

  // ── Messages from plugin ──
  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'load-sticker') showEdit(msg.data, msg.nodeId);
    if (msg.type === 'deselect') showDefault();
  };
</script>
</body>
</html>
